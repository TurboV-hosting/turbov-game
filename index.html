<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TurboV Game Studio</title>
    <meta name="description" content="Welcome to TurboV Game Studio. Check out our latest projects, including the upcoming game Rec Revival. Join our community today!">
    <meta name="keywords" content="TurboV Game Studio, TurboV, Rec Revival, Fire & Maneuver, Game Development, Indie Games">
    <meta name="robots" content="index, follow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-glow: linear-gradient(135deg, #6366f1, #a855f7);
            --btn-hover: linear-gradient(135deg, #4f46e5, #9333ea);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hero / Header Section */
        header {
            text-align: center;
            padding: 80px 20px 40px;
            position: relative;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Projects Section */
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 3px;
            background: var(--accent-glow);
            border-radius: 2px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        /* Project Card (Glassmorphism style) */
        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .project-image-wrapper {
            width: 100%;
            height: 240px;
            overflow: hidden;
            background: #16181d;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .project-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-info {
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .project-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .project-details {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .project-details p {
            margin-bottom: 4px;
        }

        .project-details span {
            color: #f43f5e; /* Highlighted "Unknown" status labels */
            font-weight: 500;
        }

        /* Discord Button */
        .btn-discord {
            display: inline-block;
            background: var(--accent-glow);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
            margin-top: auto;
        }

        .btn-discord:hover {
            background: var(--btn-hover);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 80px 20px 40px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>TurboV Game Studio</h1>
        <p>Crafting next-generation interactive experiences.</p>
    </header>

    <main class="container">
        
        <h2 class="section-title">Projects</h2>
        
        <div class="projects-grid">
            
            <article class="project-card">
                <div class="project-image-wrapper">
                    <img src="recrevival.png" alt="Rec Revival Cover Art" class="project-image" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=\'color:rgba(255,255,255,0.2)\'>recrevival.png missing</span>';">
                </div>
                <div class="project-info">
                    <div>
                        <h3 class="project-name">Rec Revival</h3>
                        <div class="project-details">
                            <p>Release Date: <span>Unknown</span></p>
                        </div>
                    </div>
                    <a href="https://discord.gg/7ypdyK3EJ6" target="_blank" rel="noopener noreferrer" class="btn-discord">
                        Rec Revival Discord Server
                    </a>
                </div>
            </article>

            <article class="project-card">
                <div class="project-image-wrapper">
                    <img src="firemaneuver.png" alt="Fire & Maneuver Cover Art" class="project-image" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=\'color:rgba(255,255,255,0.2)\'>Image Coming Soon</span>';">
                </div>
                <div class="project-info">
                    <div>
                        <h3 class="project-name">Fire & Maneuver</h3>
                        <div class="project-details">
                            <p>Starting Development: <span>Unknown</span></p>
                            <p>Release Date: <span>Unknown</span></p>
                        </div>
                    </div>
                    <a href="https://discord.gg/NvyvwH76yx" target="_blank" rel="noopener noreferrer" class="btn-discord">
                        TurboV Game Studio Discord
                    </a>
                </div>
            </article>

        </div>

    </main>

    <footer>
        <p>&copy; 2026 TurboV Game Studio. All rights reserved.</p>
    </footer>

</body>
</html>
